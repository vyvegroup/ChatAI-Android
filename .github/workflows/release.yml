name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create gradle.properties with secrets
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> gradle.properties
          echo "IMAGE_PROXY_URL=${{ secrets.IMAGE_PROXY_URL }}" >> gradle.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChatAI-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.1
          name: ChatAI v1.4.1
          body: |
            ## v1.4.1 — Proxy Image API + Crash Fix

            - **PHP Proxy**: Route image generation through configurable proxy (set `IMAGE_PROXY_URL` secret). Falls back to direct calls if empty.
            - **Duplicate Key Fix**: Prevented LazyColumn/LazyRow crash from duplicate message IDs.
            - **Model Persistence**: Selected AI model saved between sessions.
            - **New Signing Key**: New RSA 2048 keystore (JDK 17 compatible).
          files: app/build/outputs/apk/release/*.apk
