name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ORG_GRADLE_PROJECT_IMAGE_PROXY_URL: ${{ secrets.IMAGE_PROXY_URL }}
        run: |
          chmod +x gradlew
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
          ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ChatAI-release
          path: app/build/outputs/apk/release/*.apk
