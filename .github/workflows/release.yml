name: Build Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create gradle.properties with API keys
        run: |
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> gradle.properties
          echo "IMAGE_PROXY_URL=${{ secrets.IMAGE_PROXY_URL }}" >> gradle.properties

      # Try release build with existing keystore
      - name: Build Release APK (signed)
        id: release_build
        continue-on-error: true
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" > keystore.b64
            base64 -d keystore.b64 > app/release.keystore
            ./gradlew assembleRelease
          else
            echo "No keystore secret found, skipping release build"
            exit 1
          fi

      # Fallback: generate debug keystore and build with release optimizations
      - name: Build Debug APK (unsigned fallback)
        if: steps.release_build.outcome == 'failure'
        run: ./gradlew assembleDebug

      - name: Upload APK (release)
        if: steps.release_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ChatAI-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload APK (debug fallback)
        if: steps.release_build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: ChatAI-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.1
          name: ChatAI v1.4.1
          body: |
            ## v1.4.1 - Proxy Image API + Crash Fixes

            ### Changes
            - **Image Proxy**: Routes image generation through configurable PHP proxy (IMAGE_PROXY_URL). Falls back to direct calls if not set.
            - **Duplicate Key Fix**: Resolved LazyColumn/LazyRow crash when generating gallery images (distinctBy on all message updates)
            - **Model Persistence**: Selected AI model is saved and restored between sessions
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
