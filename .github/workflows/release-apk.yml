name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build Signed Release APK
        env:
          KEYSTORE_PATH: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ORG_GRADLE_PROJECT_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ORG_GRADLE_PROJECT_IMAGE_PROXY_URL: ${{ secrets.IMAGE_PROXY_URL }}
        run: |
          chmod +x gradlew
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
          ./gradlew assembleRelease --no-daemon

      - name: Get version name
        id: version
        run: echo "VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ChatAI ${{ steps.version.outputs.VERSION_NAME }}"
          body: |
            ## ChatAI Android v${{ steps.version.outputs.VERSION_NAME }}

            ### Changes:
            - Fix duplicate key crash in chat messages
            - Add PHP proxy support for image generation API
            - Add Gallery AI feature
            - Persist selected AI model preference
            - Upgrade CI/CD with signed release builds
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
